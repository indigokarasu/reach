  open_meteo:
    category: weather
    reference: open_meteo.md
    auth: none
    base_url: https://api.open-meteo.com/v1
    rate: 10000/day, 600/hour, 60/min
    actions:
      forecast:
        method: GET
        path: /forecast
        params_in: query
      archive:
        method: GET
        path: /archive
        params_in: query
        base_override: https://archive-api.open-meteo.com/v1
      marine:
        method: GET
        path: /marine
        params_in: query
        base_override: https://marine-api.open-meteo.com/v1
      air_quality:
        method: GET
        path: /air-quality
        params_in: query
        base_override: https://air-quality-api.open-meteo.com/v1
      flood:
        method: GET
        path: /flood
        params_in: query
        base_override: https://flood-api.open-meteo.com/v1
      pollen:
        method: GET
        path: /air-quality
        params_in: query
        base_override: https://air-quality-api.open-meteo.com/v1
        defaults:
          hourly: alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,olive_pollen,ragweed_pollen
  noaa_nws:
    category: weather
    reference: noaa_nws.md
    auth: none
    base_url: https://api.weather.gov
    rate: no documented hard cap
    actions:
      points:
        method: GET
        path: /points/{lat},{lon}
        params_in: path
      forecast:
        method: GET
