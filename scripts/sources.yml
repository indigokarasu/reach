sources:
  wikipedia:
    category: knowledge
    reference: wikipedia.md
    auth: none
    account: null
    base_url: https://en.wikipedia.org/w/api.php
    rate: 200/sec recommended ceiling; respect User-Agent rules
    actions:
      search:
        method: GET
        path: ''
        params_in: query
        defaults:
          action: query
          list: search
          format: json
      summary:
        method: GET
        path: /page/summary/{title}
        params_in: path
        base_override: https://en.wikipedia.org/api/rest_v1
      extract:
        method: GET
        path: ''
        params_in: query
        defaults:
          action: query
          prop: extracts
          format: json
          exintro: true
  wikidata:
    category: knowledge
    reference: wikidata.md
    auth: none
    custom: wikidata_sparql
    rate: 5/sec; 60s query timeout
    base_url: https://query.wikidata.org/sparql
    actions:
      sparql:
        description: 'Run a SPARQL query. params: { query: ''<sparql>'' }'
      entity:
        description: 'Fetch entity JSON. params: { qid: ''Q42'' }'
  openalex:
    category: science
    reference: openalex.md
    auth: none
    account: optional
    base_url: https://api.openalex.org
    rate: 10/sec polite pool, 100k/day
    actions:
      works:
        method: GET
        path: /works
        params_in: query
      authors:
        method: GET
        path: /authors
        params_in: query
      sources:
        method: GET
        path: /sources
        params_in: query
      concepts:
        method: GET
        path: /concepts
        params_in: query
  crossref:
    category: science
    reference: crossref.md
    auth: none
    base_url: https://api.crossref.org
    rate: 50/sec polite pool
    actions:
      works:
        method: GET
        path: /works
        params_in: query
      doi:
        method: GET
        path: /works/{doi}
        params_in: path
      members:
        method: GET
        path: /members
        params_in: query
  pubmed:
    category: health
    reference: pubmed.md
    auth: none
    custom: pubmed
    base_url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
    rate: 3/sec without key, 10/sec with key
    actions:
      search:
        description: 'esearch + efetch. params: { term: ''...'', limit: 20 }'
      fetch:
        description: 'efetch by PMID list. params: { pmids: [''12345'', ...] }'
      summary:
        description: 'esummary by PMID. params: { pmids: [...] }'
  arxiv:
    category: science
    reference: arxiv.md
    auth: none
    base_url: http://export.arxiv.org/api
    rate: 1 req every 3 sec recommended
    actions:
      search:
        method: GET
        path: /query
        params_in: query
  open_library:
    category: knowledge
    reference: open_library.md
    auth: none
    base_url: https://openlibrary.org
    rate: 100/min
    actions:
      search:
        method: GET
        path: /search.json
        params_in: query
      isbn:
        method: GET
        path: /isbn/{isbn}.json
        params_in: path
      author:
        method: GET
        path: /authors/{key}.json
        params_in: path
      work:
        method: GET
        path: /works/{key}.json
        params_in: path
  sec_edgar:
    category: government
    reference: sec_edgar.md
    auth: none
    custom: sec_edgar
    base_url: https://data.sec.gov
    rate: 10/sec; require User-Agent identifying caller
    actions:
      submissions:
        description: 'Recent filings for CIK. params: { cik: ''0000320193'' }'
      facts:
        description: 'Company facts (XBRL). params: { cik }'
      filing:
        description: 'Fetch a specific filing. params: { cik, accession }'
      ticker_lookup:
        description: "Resolve ticker \u2192 CIK. params: { ticker: 'AAPL' }"
  federal_register:
    category: government
    reference: federal_register.md
    auth: none
    base_url: https://www.federalregister.gov/api/v1
    rate: 1000/hour
    actions:
      documents:
        method: GET
        path: /documents.json
        params_in: query
      document:
        method: GET
        path: /documents/{doc_id}.json
        params_in: path
      agencies:
        method: GET
        path: /agencies.json
        params_in: query
  usaspending:
    category: government
    reference: usaspending.md
    auth: none
    base_url: https://api.usaspending.gov/api/v2
    rate: no published cap
    actions:
      awards_search:
        method: POST
        path: /search/spending_by_award/
        params_in: body
      award:
        method: GET
        path: /awards/{award_id}/
        params_in: path
      agencies:
        method: GET
        path: /references/toptier_agencies/
        params_in: query
  gdelt:
    category: media
    reference: gdelt.md
    auth: none
    base_url: https://api.gdeltproject.org/api/v2
    rate: no published cap; throttle to <1/sec
