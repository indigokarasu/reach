      query:
        method: GET
        path: /query
        params_in: query
        defaults:
          format: geojson
      count:
        method: GET
        path: /count
        params_in: query
      version:
        method: GET
        path: /version
        params_in: query
  nominatim:
    category: geo
    reference: nominatim.md
    auth: none
